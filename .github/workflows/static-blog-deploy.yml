name: Deploy Static Blog to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static source
        shell: bash
        run: |
          mkdir -p pages-src
          cat > pages-src/index.md <<'EOF'
          ---
          title: JustOneMoreStep - DEV April Fools Submission
          ---
          EOF
          cat DEV_APRIL_FOOLS_SUBMISSION.md >> pages-src/index.md

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./pages-src
          destination: ./pages-build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
